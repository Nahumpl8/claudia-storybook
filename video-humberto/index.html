<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Humberto — con amor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  background: #1a0e05;
  font-family: 'Lora', serif;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.container {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 20px; max-width: 900px; width: 100%;
}
h1 {
  font-family: 'Playfair Display', serif;
  color: #f5c842;
  font-size: clamp(24px, 5vw, 40px);
  text-align: center;
  margin-bottom: 24px;
  text-shadow: 0 0 30px rgba(245,200,66,0.3);
}
.video-wrapper {
  width: 100%;
  max-width: 800px;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid rgba(245,200,66,0.25);
  box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 60px rgba(245,200,66,0.08);
  background: #0d0704;
}
video {
  width: 100%; display: block;
}
.back-link {
  margin-top: 24px;
  font-family: 'Lora', serif;
  font-style: italic;
  color: rgba(245,200,66,0.5);
  text-decoration: none;
  font-size: 14px;
  transition: color 0.3s;
}
.back-link:hover { color: #f5c842; }

/* Vignette */
body::after {
  content: ''; position: fixed; inset: 0;
  box-shadow: inset 0 0 150px rgba(0,0,0,0.5);
  pointer-events: none; z-index: 10;
}
</style>
</head>
<body>
<div class="container">
  <h1>Para Humberto</h1>
  <div class="video-wrapper">
    <video controls playsinline preload="metadata">
      <source src="/videos/humberto.mp4" type="video/mp4">
      Tu navegador no soporta video HTML5.
    </video>
  </div>
  <a href="/" class="back-link">← Volver al libro</a>
</div>
</body>
</html>
